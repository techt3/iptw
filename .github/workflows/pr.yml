name: Development Build

on:
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  GO_VERSION: "1.26.0"

jobs:
  test-and-build:
    name: Test and Build (PR)
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libayatana-appindicator3-dev

      - name: Install dependencies
        run: go mod tidy

      - name: Build for current platform
        run: make build

      - name: Test service functionality (Unix)
        if: runner.os != 'Windows'
        run: |
          ./build/iptw --help
          echo "✅ Binary runs successfully on ${{ runner.os }}"

      - name: Test service functionality (Windows)
        if: runner.os == 'Windows'
        run: |
          .\build\iptw.exe --help
          echo "✅ Binary runs successfully on Windows"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: iptw-dev-${{ runner.os }}-${{ github.sha }}
          path: |
            build/iptw*
            README.md
          retention-days: 7

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libayatana-appindicator3-dev

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11

      - name: Run additional checks
        run: |
          go vet ./...
          go fmt ./...
          git diff --exit-code || (echo "Code is not formatted. Please run 'go fmt ./...'" && exit 1)
